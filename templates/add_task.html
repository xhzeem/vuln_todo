{% extends "base.html" %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto;">
    <h1 class="title">Create New Task</h1>
    <p class="subtitle">Add a new item to your Nexus dashboard.</p>

    <form method="POST" action="/task/add">
        <div class="form-group">
            <label for="title">Task Title</label>
            <input type="text" id="title" name="title" required placeholder="e.g., Q3 Security Review">
        </div>
        <div class="form-group">
            <label for="description">Description (Markdown Supported)</label>
            <textarea id="description" name="description" placeholder="Enter task details..."></textarea>
            <small style="color: var(--text-muted); display: block; margin-top: 0.5rem;">Note: HTML tags are rendered
                for rich text support.</small>
        </div>
        <div style="display: flex; gap: 1rem;">
            <button type="submit" class="btn">Save Task</button>
            <a href="/dashboard" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
