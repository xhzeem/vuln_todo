{% extends "base.html" %}

{% block content %}
<div class="card" style="max-width: 800px; margin: 0 auto;">
    <h1 class="title">System Diagnostics</h1>
    <p class="subtitle">Check connectivity with external Nexus sync servers.</p>

    <div
        style="background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); padding: 1rem; border-radius: 0.5rem; margin-bottom: 2rem;">
        <strong style="color: #FCA5A5;">Admin Access Only</strong> - For internal network troubleshooting. Uses system
        layer commands.
    </div>

    <form method="POST" action="/system_check">
        <div class="form-group">
            <label for="ip">Sync Server IP Address</label>
            <input type="text" id="ip" name="ip" placeholder="e.g., 8.8.8.8" required>
        </div>
        <button type="submit" class="btn btn-danger">Run Ping Diagnostics</button>
    </form>

    {% if output %}
    <div class="term-box">{{ output }}</div>
    {% endif %}
</div>
{% endblock %}
